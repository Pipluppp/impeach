name: Validate repository

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Validate GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  pipeline-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements-dev.txt
      - name: Install media runtime
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg
      - run: python -m pip install -r pipeline/requirements-dev.txt
      - run: ruff check pipeline
      - run: python -m pytest -q pipeline/tests

  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npx wrangler deploy --dry-run --env preview
