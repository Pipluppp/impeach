name: Deploy static reader

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "web/**"
  workflow_dispatch:
    inputs:
      target:
        description: Cloudflare environment
        type: choice
        options: [preview, production]
        default: preview

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event_name == 'push' && 'production' || inputs.target }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ github.event_name == 'push' && 'production' || inputs.target }}
    env:
      DEPLOY_TARGET: ${{ github.event_name == 'push' && 'production' || inputs.target }}
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check
      - name: Deploy selected static-assets environment
        run: npx wrangler deploy --env "$DEPLOY_TARGET"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
